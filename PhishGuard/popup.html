<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PhishGuard Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/premium.css">
  <style>
    body {
      width: 340px;
      padding: 16px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--primary);
    }

    .url-info {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .risk-score {
      text-align: center;
      margin: 20px 0;
    }

    .risk-value {
      font-size: 2.5rem;
      font-weight: 800;
      display: block;
    }

    .risk-label {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .features-list {
      margin-top: 20px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
    }

    .f-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .footer-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .footer-actions button {
      flex: 1;
      font-size: 0.75rem;
    }
  </style>
</head>

<body class="glass-card">
  <div class="header">
    <div class="logo-text">Phish<span>Guard</span> AI</div>
    <span id="statusBadge" class="status-badge status-safe">Scanning</span>
  </div>

  <div class="url-info" id="currentUrl">Detecting environment...</div>

  <div class="risk-score">
    <div class="speedometer-container">
      <div class="speedometer-bg"></div>
      <div class="speedometer-fill" id="riskNeedle"></div>
    </div>
    <span class="risk-value" id="riskValue">0%</span>
    <span class="risk-label">Threat Probability</span>
  </div>

  <div class="features-list" id="featureFlags">
    <!-- Dynamic feature flags like "Tunneling Detected" -->
  </div>

  <div class="footer-actions">
    <button class="premium-btn" id="openDashboard">Full Dashboard</button>
    <button class="premium-btn" id="toggleSafeMode" style="background: rgba(255,255,255,0.1)">Safe Mode: Off</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PhishGuard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 12px;
      color: #111;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
    }

    h1 {
      font-size: 16px;
      margin: 0;
    }

    p.small {
      font-size: 12px;
      color: #555;
      margin: 4px 0 8px;
    }

    .url {
      font-size: 13px;
      color: #0b5394;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    .risk-bar {
      height: 10px;
      width: 100%;
      background: #eee;
      border-radius: 6px;
      margin: 8px 0;
      overflow: hidden;
    }

    .risk-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b6b, #ffcc00);
    }

    .risk-text {
      font-weight: 600;
      font-size: 14px;
      margin-top: 4px;
    }

    button {
      padding: 8px 10px;
      margin: 6px 4px 0 0;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
    }

    label {
      font-size: 13px;
      color: #444;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    footer {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="header">
    <img id="icon" src="icon.svg" alt="icon">
    <div>
      <h1>PHISHGUARD</h1>
      <p class="small">Realtime URL detection (local)</p>
    </div>
  </div>

  <div id="content">
    <div style="margin-top:10px">
      <div class="url" id="currentUrl">Loading current tab…</div>
      <div class="risk-bar" title="Risk">
        <div class="risk-fill" id="riskFill"></div>
      </div>
      <div class="risk-text" id="riskText">Risk: —</div>
      <div class="explain small" id="explain">Confidence and heuristic fused score shown here.</div>
    </div>

    <footer>
      Model: <span id="modelDate">local</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
